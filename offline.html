<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Quiz Competitors</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(160deg, #f0fdfa 0%, #ecfeff 50%, #fff7ed 100%);
      color: #0f172a;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      border: 1px solid rgba(13,148,136,.16);
      box-shadow: 0 14px 36px rgba(13,148,136,.16);
    }
    h1 { margin: 0 0 10px; color: #0f766e; font-size: 1.35rem; }
    p { margin: 0; color: #475569; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You are offline</h1>
    <p>Internet is required for login, quiz submission, and leaderboard updates. Reconnect and try again.</p>
  </div>
</body>
</html>
